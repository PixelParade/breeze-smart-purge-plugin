name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PLUGIN_SLUG: breeze-smart-purge
  # Cloudways application ID (dashboard → application → tyaxssmjcp)
  STAGING_APP_ID: tyaxssmjcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rsync to Cloudways staging
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=.git --exclude=.github --exclude=.cursor --exclude=.env.deploy.local --exclude=docs --exclude=scripts --exclude=README.md --exclude=LICENSE
          path: ./
          # Cloudways master path; equivalent to .../1305358.cloudwaysapps.com/tyaxssmjcp/...
          remote_path: /home/master/applications/${{ env.STAGING_APP_ID }}/public_html/wp-content/plugins/${{ env.PLUGIN_SLUG }}/
          remote_host: ${{ secrets.STAGING_SSH_HOST }}
          remote_user: ${{ secrets.STAGING_SSH_USER }}
          remote_key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy summary
        run: |
          echo "Deployed branch ${{ github.ref_name }} commit ${{ github.sha }} to staging."
          echo "Plugin path: wp-content/plugins/${{ env.PLUGIN_SLUG }}/"
          echo "Staging updates from main automatically; use GitHub Releases + WP Updates for versioned rollouts."
