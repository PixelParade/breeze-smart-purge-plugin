name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PLUGIN_SLUG: smart-purge-for-breeze-cache
  STAGING_REMOTE_PLUGIN_PATH: public_html/wp-content/plugins/smart-purge-for-breeze-cache

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy plugin files to Cloudways staging
        env:
          SSHPASS: ${{ secrets.STAGING_SSH_PASSWORD }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
          REMOTE="${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:${{ env.STAGING_REMOTE_PLUGIN_PATH }}/"
          sshpass -e scp -o StrictHostKeyChecking=no smart-purge-for-breeze-cache.php readme.txt "$REMOTE"

      - name: Deploy summary
        run: |
          echo "Deployed branch ${{ github.ref_name }} commit ${{ github.sha }} to staging."
          echo "Plugin path: ${{ env.STAGING_REMOTE_PLUGIN_PATH }}/"
          echo "Staging tracks main on push. Use GitHub Releases for versioned WP Updates."
