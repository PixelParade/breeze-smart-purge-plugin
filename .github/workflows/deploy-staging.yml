name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PLUGIN_SLUG: breeze-smart-purge
  STAGING_APP_ID: tyaxssmjcp
  # Application SSH user (cursor-user) — relative to its home directory
  STAGING_REMOTE_PLUGIN_PATH: public_html/wp-content/plugins/breeze-smart-purge

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy plugin files to Cloudways staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          password: ${{ secrets.STAGING_SSH_PASSWORD }}
          port: 22
          source: "breeze-smart-purge.php,readme.txt"
          target: ${{ env.STAGING_REMOTE_PLUGIN_PATH }}/
          overwrite: true

      - name: Deploy summary
        run: |
          echo "Deployed branch ${{ github.ref_name }} commit ${{ github.sha }} to staging."
          echo "Plugin path: ${{ env.STAGING_REMOTE_PLUGIN_PATH }}/"
          echo "Staging tracks main on push. Use GitHub Releases for versioned WP Updates."
