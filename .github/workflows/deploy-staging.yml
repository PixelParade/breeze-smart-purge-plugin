name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  PLUGIN_SLUG: breeze-smart-purge
  # Replace with your Cloudways application ID from the app dashboard.
  STAGING_APP_ID: tyaxssmjcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rsync to Cloudways staging
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=.git --exclude=.github --exclude=.cursor
          path: ./
          remote_path: /home/master/applications/${{ env.STAGING_APP_ID }}/public_html/wp-content/plugins/${{ env.PLUGIN_SLUG }}/
          remote_host: ${{ secrets.STAGING_SSH_HOST }}
          remote_user: ${{ secrets.STAGING_SSH_USER }}
          remote_key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Activate plugin on staging (optional)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /home/master/applications/${{ env.STAGING_APP_ID }}/public_html
            wp plugin activate ${{ env.PLUGIN_SLUG }} --allow-root 2>/dev/null || true
