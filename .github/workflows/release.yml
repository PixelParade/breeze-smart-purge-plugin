name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PLUGIN_SLUG: smart-purge-for-breeze-cache
  ZIP_NAME: smart-purge-for-breeze-cache.zip

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p build/${{ env.PLUGIN_SLUG }}
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='.env.deploy.local' \
            --exclude='docs' \
            --exclude='scripts' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='build' \
            --exclude='*.zip' \
            ./ build/${{ env.PLUGIN_SLUG }}/
          cd build && zip -r ../${{ env.ZIP_NAME }} ${{ env.PLUGIN_SLUG }}

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "Release asset: smart-purge-for-breeze-cache.zip (folder ${{ env.PLUGIN_SLUG }}/ inside zip)"
          echo "WordPress: Dashboard → Plugins → Update (needs BSP_GITHUB_TOKEN while repo is private)"
          echo "MainWP: install/update from the GitHub release asset URL"
          echo "Release URL: ${{ steps.gh_release.outputs.url }}"
