name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PLUGIN_SLUG: smart-purge-for-breeze-cache
  AGENCY_ZIP: smart-purge-for-breeze-cache.zip
  WPORG_ZIP: smart-purge-for-breeze-cache-wporg.zip

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build agency and wordpress.org zips
        run: bash scripts/build-plugin-zips.sh

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.AGENCY_ZIP }}
            ${{ env.WPORG_ZIP }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "Agency asset (MainWP / BSP_GITHUB_TOKEN): ${{ env.AGENCY_ZIP }}"
          echo "  Includes: includes/github-updater.php, includes/agency/"
          echo "wordpress.org asset (SVN — manual upload): ${{ env.WPORG_ZIP }}"
          echo "  Excludes updater and agency-only code (.distignore.wporg)"
          echo "Release URL: ${{ steps.gh_release.outputs.url }}"
