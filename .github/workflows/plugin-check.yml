name: Plugin Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli

      - name: Build wordpress.org distributable folder
        run: |
          mkdir -p build/smart-purge-for-breeze-cache
          rsync -av \
            --exclude-from='.distignore' \
            --exclude-from='.distignore.wporg' \
            --exclude='build' \
            ./ build/smart-purge-for-breeze-cache/

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './build/smart-purge-for-breeze-cache'
          exclude-directories: '.git,.github'

  build-zips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build both zips (smoke test)
        run: bash scripts/build-plugin-zips.sh

      - name: Verify agency zip contents
        run: |
          unzip -l smart-purge-for-breeze-cache.zip | grep -E 'github-updater|includes/agency/bootstrap'
          bash scripts/verify-plugin-zip.sh smart-purge-for-breeze-cache.zip
          test ! -f build/wporg/pixelparade-smart-purge-for-breeze-cache/includes/github-updater.php
          test ! -d build/wporg/pixelparade-smart-purge-for-breeze-cache/includes/agency
          bash scripts/verify-plugin-zip.sh smart-purge-for-breeze-cache-wporg.zip pixelparade-smart-purge-for-breeze-cache

  phpunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: composer test
