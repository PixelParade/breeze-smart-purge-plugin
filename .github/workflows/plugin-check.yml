name: Plugin Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli

      - name: Build wordpress.org distributable folder
        run: |
          mkdir -p build/wporg/smart-purge-for-breeze-cache
          rsync -av \
            --exclude-from='.distignore' \
            --exclude-from='.distignore.wporg' \
            --exclude='build' \
            ./ build/wporg/smart-purge-for-breeze-cache/
          bash scripts/apply-wporg-transform.sh build/wporg

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './build/wporg/pixelparade-smart-purge-for-breeze-cache'
          exclude-directories: '.git,.github'
          # Keep TextDomainMismatch ignored: frontend Breeze toolbar mirror labels use
          # esc_html__(…, 'breeze') on purpose so translations match Breeze admin-bar.
          # Plugin-owned strings use the plugin text domain. Removing this ignore fails CI
          # (e.g. run 29298254730). Nonce / breeze_clear_all_cache warnings are expected noise.
          ignore-codes: |
            WordPress.WP.I18n.TextDomainMismatch

  build-zips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build both zips (smoke test)
        run: bash scripts/build-plugin-zips.sh

      - name: Verify agency and wporg zip contents
        run: |
          unzip -l smart-purge-for-breeze-cache.zip | grep -E 'github-updater|includes/agency/bootstrap'
          bash scripts/verify-plugin-zip.sh smart-purge-for-breeze-cache.zip
          test ! -f build/wporg/pixelparade-smart-purge-for-breeze-cache/includes/github-updater.php
          test ! -d build/wporg/pixelparade-smart-purge-for-breeze-cache/includes/agency
          ! unzip -l pixelparade-smart-purge-for-breeze-cache-wporg.zip | grep -E 'icon-128x128|icon-256x256|assets/wporg/'
          bash scripts/verify-plugin-zip.sh pixelparade-smart-purge-for-breeze-cache-wporg.zip pixelparade-smart-purge-for-breeze-cache
          # Prefix + textdomain smoke checks inside wporg zip
          unzip -p pixelparade-smart-purge-for-breeze-cache-wporg.zip pixelparade-smart-purge-for-breeze-cache/pixelparade-smart-purge-for-breeze-cache.php \
            | grep -q "Text Domain: pixelparade-smart-purge-for-breeze-cache"
          # Function/AJAX prefix must be ppspb_ (legacy bsp_* option strings in migration are OK).
          ! unzip -p pixelparade-smart-purge-for-breeze-cache-wporg.zip pixelparade-smart-purge-for-breeze-cache/pixelparade-smart-purge-for-breeze-cache.php \
            | grep -E 'function bsp_|wp_ajax_bsp_|define\('\''BSP_'
          unzip -p pixelparade-smart-purge-for-breeze-cache-wporg.zip pixelparade-smart-purge-for-breeze-cache/pixelparade-smart-purge-for-breeze-cache.php \
            | grep -q 'function ppspb_'
          unzip -p pixelparade-smart-purge-for-breeze-cache-wporg.zip pixelparade-smart-purge-for-breeze-cache/pixelparade-smart-purge-for-breeze-cache.php \
            | grep -q "breeze_token_name"

  phpunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: composer test
