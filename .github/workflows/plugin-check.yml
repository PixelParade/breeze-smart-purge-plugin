name: Plugin Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli

      - name: Build distributable plugin folder
        run: |
          mkdir -p build/breeze-smart-purge
          rsync -av \
            --exclude-from='.distignore' \
            --exclude='build' \
            ./ build/breeze-smart-purge/

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './build/breeze-smart-purge'
          exclude-directories: '.git,.github'
